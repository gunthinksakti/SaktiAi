name: Build Android APK

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write   # dibutuhkan untuk membuat release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK (release, per-ABI)
        run: flutter build apk --release --split-per-abi

      - name: Prepare artifacts
        run: |
          mkdir -p ../dist
          cp build/app/outputs/flutter-apk/*.apk ../dist/
          ls -la ../dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Build
          prerelease: true
          body: |
            Auto-build APK terbaru dari branch `master`.
            Diperbarui otomatis oleh GitHub Actions.
          files: dist/*.apk
