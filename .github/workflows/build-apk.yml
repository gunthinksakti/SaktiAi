name: Build Android APK

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Backup our source
        run: |
          mkdir -p /tmp/sakti_src
          cp app/lib/main.dart /tmp/sakti_src/main.dart
          cp app/pubspec.yaml /tmp/sakti_src/pubspec.yaml

      - name: Generate standard Flutter project (android/ + ios/)
        working-directory: app
        run: flutter create --platforms=android .

      - name: Restore our source
        run: |
          cp /tmp/sakti_src/main.dart app/lib/main.dart
          cp /tmp/sakti_src/pubspec.yaml app/pubspec.yaml

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos

      - name: Build APK (release, per-ABI)
        working-directory: app
        run: flutter build apk --release --split-per-abi

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp app/build/app/outputs/flutter-apk/*.apk dist/
          ls -la dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Build
          prerelease: true
          body: |
            Auto-build APK terbaru dari branch `master`.
            Diperbarui otomatis oleh GitHub Actions.
          files: dist/*.apk
