<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Chat + Gambar — Puter.js Demo</title>
<style>
  :root { --bg:#0f1220; --card:#1a1f33; --accent:#6c8cff; --text:#e8ecff; --muted:#9aa4c7; }
  * { box-sizing:border-box; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  body { margin:0; background:var(--bg); color:var(--text); min-height:100vh; padding:24px; }
  .wrap { max-width:720px; margin:0 auto; }
  h1 { font-size:22px; margin:0 0 4px; }
  p.sub { color:var(--muted); margin:0 0 20px; font-size:14px; }
  .card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:16px; }
  textarea { width:100%; min-height:80px; resize:vertical; background:#0c0f1c; color:var(--text);
    border:1px solid #2a3050; border-radius:12px; padding:12px; font-size:15px; }
  .row { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
  button { background:var(--accent); color:#fff; border:0; border-radius:12px; padding:11px 18px;
    font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  button.ghost { background:transparent; border:1px solid #2a3050; color:var(--text); }
  #status { font-size:13px; color:var(--muted); margin-top:10px; min-height:18px; }
  #chat { white-space:pre-wrap; line-height:1.5; font-size:15px; }
  #img { width:100%; border-radius:12px; margin-top:12px; display:none; }
  .badge { display:inline-block; background:#2a3050; color:var(--muted); border-radius:999px;
    padding:3px 10px; font-size:12px; margin-bottom:8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>AI Chat + Gambar</h1>
  <p class="sub">Powered by Puter.js — keyless, serverless. Login Puter sekali saat pertama generate.</p>

  <div class="card">
    <span class="badge">Prompt</span>
    <textarea id="prompt" placeholder="Contoh: jelaskan apa itu black hole dalam bahasa sederhana"></textarea>
    <div class="row">
      <button id="btnChat" onclick="doChat()">💬 Chat AI</button>
      <button id="btnImg" class="ghost" onclick="doImage()">🎨 Generate Gambar</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="card" id="chatCard" style="display:none">
    <span class="badge">Balasan AI</span>
    <div id="chat"></div>
  </div>

  <div class="card" id="imgCard" style="display:none">
    <span class="badge">Hasil Gambar</span>
    <img id="img" alt="generated image" />
  </div>
</div>

<script src="https://js.puter.com/v2/"></script>
<script>
  const $ = id => document.getElementById(id);
  const setStatus = m => $('status').textContent = m;

  async function doChat() {
    const p = $('prompt').value.trim();
    if (!p) { setStatus('Tulis prompt dulu ya.'); return; }
    $('btnChat').disabled = true;
    setStatus('Meminta ke AI… (login Puter kalau muncul)');
    try {
      const reply = await puter.ai.chat(p);
      $('chatCard').style.display = 'block';
      $('chat').textContent = reply;
      setStatus('Selesai ✓');
    } catch (e) {
      setStatus('Error: ' + (e?.message || e));
    } finally {
      $('btnChat').disabled = false;
    }
  }

  async function doImage() {
    const p = $('prompt').value.trim();
    if (!p) { setStatus('Tulis prompt dulu ya.'); return; }
    $('btnImg').disabled = true;
    setStatus('Membuat gambar… ini butuh beberapa detik');
    try {
      const image = await puter.ai.txt2img(p);
      $('imgCard').style.display = 'block';
      $('img').style.display = 'block';
      $('img').src = image;
      setStatus('Gambar jadi ✓ (klik kanan → simpan)');
    } catch (e) {
      setStatus('Error: ' + (e?.message || e));
    } finally {
      $('btnImg').disabled = false;
    }
  }
</script>
</body>
</html>
